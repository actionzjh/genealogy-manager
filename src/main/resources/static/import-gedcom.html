<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEDCOM导入 - 家谱管理系统</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .import-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 15px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        input[type="file"] {
            padding: 10px;
        }
        .info-box {
            background: #f0f5ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }
        .info-box ul {
            margin: 10px 0 0 20px;
        }
        .info-box li {
            margin: 5px 0;
        }
        .btn-import {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-import:hover {
            transform: translateY(-2px);
        }
        .btn-import:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .result-box {
            margin-top: 30px;
            display: none;
        }
        .result-box.success {
            background: #f0fff4;
            border: 1px solid #6ee08f;
            border-radius: 6px;
            padding: 20px;
            display: block;
        }
        .result-box.error {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 6px;
            padding: 20px;
            display: block;
        }
        .result-box h3 {
            margin-bottom: 15px;
            font-size: 16px;
        }
        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .stat {
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 6px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .progress {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            animation: progress-anim 1.5s ease-in-out infinite;
        }
        @keyframes progress-anim {
            0% { width: 30%; }
            50% { width: 70%; }
            100% { width: 30%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📥 GEDCOM 文件导入</h1>
        <p>从其他家谱软件导入GEDCOM 5.5格式文件</p>
    </div>

    <div class="container">
        <div class="import-card">
            <div class="info-box">
                <strong>💡 导入说明：</strong>
                <ul>
                    <li>支持标准 GEDCOM 5.5 格式文件</li>
                    <li>可导入从 Ancestry、MyHeritage、RootsMagic 等软件导出的文件</li>
                    <li>自动解析人物信息、家庭关系和事件日期</li>
                    <li>自动计算世代数</li>
                </ul>
            </div>

            <form id="importForm">
                <div class="form-group">
                    <label>家谱名称 *</label>
                    <input type="text" id="name" name="name" required placeholder="请输入导入后的家谱名称">
                </div>
                <div class="form-group">
                    <label>姓氏（可选）</label>
                    <input type="text" id="surname" name="surname" placeholder="请输入主要姓氏">
                </div>
                <div class="form-group">
                    <label>GEDCOM 文件 *</label>
                    <input type="file" id="file" name="file" accept=".ged,.gedcom,.txt" required>
                </div>
                <button type="submit" class="btn-import" id="importBtn">开始导入</button>
                <div class="progress" id="progress">
                    <div class="progress-bar"></div>
                </div>
            </form>

            <div id="resultBox" class="result-box">
                <div id="resultContent"></div>
            </div>

            <a href="genealogy-list.html" class="back-link">← 返回我的家谱</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');

        document.getElementById('importForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('file');
            const nameInput = document.getElementById('name');
            const surnameInput = document.getElementById('surname');
            const btn = document.getElementById('importBtn');
            const progress = document.getElementById('progress');
            const resultBox = document.getElementById('resultBox');

            if (!fileInput.files || fileInput.files.length === 0) {
                alert('请选择文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('name', nameInput.value);
            if (surnameInput.value) {
                formData.append('surname', surnameInput.value);
            }

            btn.disabled = true;
            progress.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('/api/gedcom/import', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    body: formData
                });

                const data = await response.json();

                progress.style.display = 'none';
                resultBox.style.display = 'block';

                if (data.code === 0) {
                    resultBox.className = 'result-box success';
                    let html = `
                        <h3>✅ 导入成功！</h3>
                        <p>家谱【${escapeHtml(data.genealogyId ? nameInput.value : '')}】已导入</p>
                        <div class="result-stats">
                            <div class="stat">
                                <div class="stat-value">${data.totalPersons}</div>
                                <div class="stat-label">导入人物</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${data.totalFamilies}</div>
                                <div class="stat-label">家庭关系</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${data.maxGeneration || 0}</div>
                                <div class="stat-label">最大世代</div>
                            </div>
                        </div>
                        <p style="margin-top: 20px;">
                            <a href="person-list.html?genealogyId=${data.genealogyId}" style="color: #667eea;">查看人物列表 →</a>
                        </p>
                    `;
                    document.getElementById('resultContent').innerHTML = html;
                } else {
                    resultBox.className = 'result-box error';
                    document.getElementById('resultContent').innerHTML = `<h3>❌ 导入失败</h3><p>${escapeHtml(data.message)}</p>`;
                }

            } catch (error) {
                progress.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.className = 'result-box error';
                document.getElementById('resultContent').innerHTML = `<h3>❌ 导入失败</h3><p>网络错误: ${error.message}</p>`;
            }

            btn.disabled = false;
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
