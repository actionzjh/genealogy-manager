<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物列表 - 家谱管理系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header .user-info { font-size: 14px; }
        .header a { color: #ffd700; text-decoration: none; margin-left: 15px; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .filter-bar { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .filter-bar input[type="text"] { flex: 1; min-width: 200px; }
        .filter-bar button { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .filter-bar button:hover { background: #5568d3; }
        .stats { display: flex; gap: 15px; margin-bottom: 15px; }
        .stat-card { flex: 1; background: white; border-radius: 8px; padding: 15px; text-align: center; }
        .stat-card .num { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 5px; }
        .person-list { background: white; border-radius: 8px; overflow: hidden; }
        .person-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .person-item:hover { background: #f8f7ff; }
        .person-item:last-child { border-bottom: none; }
        .person-info .name { font-size: 16px; font-weight: 600; color: #333; }
        .person-info .meta { font-size: 13px; color: #888; margin-top: 4px; }
        .person-info .generation { background: #667eea; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; margin-right: 8px; }
        .person-actions a { padding: 5px 12px; background: #f0f0f0; color: #667eea; text-decoration: none; border-radius: 4px; font-size: 13px; border: 1px solid #ddd; }
        .person-actions a:hover { background: #667eea; color: white; }
        .empty { text-align: center; padding: 60px 20px; color: #888; }
        .empty-icon { font-size: 48px; margin-bottom: 10px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 15px; }
        .pagination button { padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
        .pagination button:disabled { color: #ccc; cursor: not-allowed; }
        .pagination span { font-size: 14px; color: #666; }
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>人物列表</h1>
        <div class="user-info">
            <span id="displayName"></span>
            <a href="people-admin.html">管理入口</a>
            <a href="genealogy-list.html">返回家谱</a>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="num" id="totalCount">-</div>
                <div class="label">总人数</div>
            </div>
            <div class="stat-card">
                <div class="num" id="maleCount">-</div>
                <div class="label">男性</div>
            </div>
            <div class="stat-card">
                <div class="num" id="femaleCount">-</div>
                <div class="label">女性</div>
            </div>
        </div>

        <div class="filter-bar">
            <select id="genealogyId">
                <option value="">全部家谱</option>
            </select>
            <select id="gender">
                <option value="">全部性别</option>
                <option value="M">男</option>
                <option value="F">女</option>
            </select>
            <input type="text" id="keyword" placeholder="搜索姓名、字、号...">
            <button onclick="renderList(1)">搜索</button>
        </div>

        <div class="person-list" id="personList">
            <div class="loading">加载中...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        const pageSize = 20;
        let state = { persons: [], genealogies: [], currentGenealogy: null };

        function getToken() { return localStorage.getItem('token'); }
        function getUserId() { return localStorage.getItem('userId'); }
        function getParam(name) { return new URLSearchParams(location.search).get(name); }

        async function apiGet(url) {
            const res = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            if (res.status === 401) {
                localStorage.clear();
                location.href = 'login.html';
                throw new Error('未登录');
            }
            return res.json();
        }

        function setStatus(msg, type) {
            const el = document.getElementById('personList');
            el.innerHTML = `<div class="empty"><div class="empty-icon">!</div><div>${msg}</div></div>`;
        }

        function renderStats(persons) {
            document.getElementById('totalCount').textContent = persons.length;
            document.getElementById('maleCount').textContent = persons.filter(p => p.gender === 'M').length;
            document.getElementById('femaleCount').textContent = persons.filter(p => p.gender === 'F').length;
        }

        function genderLabel(g) {
            if (g === 'M') return '男';
            if (g === 'F') return '女';
            return '未知';
        }

        function renderList(page) {
            const gid = document.getElementById('genealogyId').value;
            const gender = document.getElementById('gender').value;
            const keyword = document.getElementById('keyword').value.trim().toLowerCase();

            let filtered = state.persons.filter(p => {
                if (gid && String(p.genealogyId) !== gid) return false;
                if (gender && p.gender !== gender) return false;
                if (keyword) {
                    const name = (p.name || '').toLowerCase();
                    const styleName = (p.styleName || '').toLowerCase();
                    const hao = (p.hao || '').toLowerCase();
                    if (!name.includes(keyword) && !styleName.includes(keyword) && !hao.includes(keyword)) return false;
                }
                return true;
            });

            renderStats(filtered);

            const total = filtered.length;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            if (page < 1) page = 1;
            if (page > totalPages) page = totalPages;

            const start = (page - 1) * pageSize;
            const pageData = filtered.slice(start, start + pageSize);

            if (pageData.length === 0) {
                document.getElementById('personList').innerHTML = '<div class="empty"><div class="empty-icon">-</div><div>暂无人物记录</div></div>';
            } else {
                document.getElementById('personList').innerHTML = pageData.map(p => `
                    <div class="person-item" onclick="location.href='person-detail.html?id=${p.id}'">
                        <div class="person-info">
                            <div class="name">
                                ${p.generation ? `<span class="generation">第${p.generation}世</span>` : ''}
                                ${p.name || '未知姓名'}
                                ${p.gender ? ` (${genderLabel(p.gender)})` : ''}
                            </div>
                            <div class="meta">
                                ${p.styleName ? `字：${p.styleName}　` : ''}
                                ${p.hao ? `号：${p.hao}　` : ''}
                                ${p.birthYear ? `生：${p.birthYear}年　` : ''}
                                ${p.deathYear ? `卒：${p.deathYear}年` : ''}
                            </div>
                        </div>
                        <div class="person-actions">
                            <a href="person-detail.html?id=${p.id}">查看详情</a>
                        </div>
                    </div>
                `).join('');
            }

            // 分页
            document.getElementById('pagination').innerHTML = `
                <button ${page <= 1 ? 'disabled' : ''} onclick="renderList(${page - 1})">上一页</button>
                <span>第 ${page} / ${totalPages} 页，共 ${total} 条</span>
                <button ${page >= totalPages ? 'disabled' : ''} onclick="renderList(${page + 1})">下一页</button>
            `;
        }

        async function init() {
            const token = getToken();
            if (!token) {
                location.href = 'login.html';
                return;
            }

            document.getElementById('displayName').textContent = localStorage.getItem('displayName') || localStorage.getItem('username') || '';

            try {
                const [genealogies, persons] = await Promise.all([
                    apiGet('/api/genealogy/all'),
                    apiGet('/api/person/all')
                ]);

                state.genealogies = Array.isArray(genealogies) ? genealogies : [];
                // 支持 {data: [...], total: N} 或直接返回数组两种格式
                const personsData = Array.isArray(persons) ? persons : (Array.isArray(persons?.data) ? persons.data : []);
                state.persons = personsData;

                // 填充家谱下拉
                const gidSelect = document.getElementById('genealogyId');
                state.genealogies.forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g.id;
                    opt.textContent = g.name;
                    gidSelect.appendChild(opt);
                });

                // URL 参数优先
                const urlGid = getParam('genealogyId');
                if (urlGid) gidSelect.value = urlGid;

                renderList(1);

                // 搜索事件
                document.getElementById('keyword').addEventListener('keypress', e => {
                    if (e.key === 'Enter') renderList(1);
                });
                document.getElementById('genealogyId').addEventListener('change', () => renderList(1));
                document.getElementById('gender').addEventListener('change', () => renderList(1));

            } catch (err) {
                setStatus('加载失败: ' + err.message, 'error');
            }
        }

        init();
    </script>
</body>
</html>
