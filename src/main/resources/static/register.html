<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 家谱管理系统</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        h2 {
            text-align: center;
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            font-weight: normal;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .success-message {
            color: #27ae60;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .home-link {
            text-align: center;
            margin-top: 10px;
        }
        .home-link a {
            color: #999;
            text-decoration: none;
        }
        .home-link a:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>家谱管理系统</h1>
        <h2>用户注册</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用户名 <span style="color: #e74c3c;">*</span></label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码 <span style="color: #e74c3c;">*</span></label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label for="displayName">昵称</label>
                <input type="text" id="displayName" name="displayName" placeholder="请输入显示昵称">
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱（用于找回密码）">
            </div>
            <button type="submit">注册</button>
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </form>
        <div class="login-link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
        <div class="home-link">
            <a href="index.html">返回首页</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value.trim();
            const email = document.getElementById('email').value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            // 前端简单校验
            if (!username) {
                errorDiv.textContent = '用户名不能为空';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            if (username.length < 2 || username.length > 30) {
                errorDiv.textContent = '用户名长度必须在2-30个字符之间';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            if (!password) {
                errorDiv.textContent = '密码不能为空';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            if (password.length < 6 || password.length > 50) {
                errorDiv.textContent = '密码长度必须在6-50个字符之间';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errorDiv.textContent = '邮箱格式不正确';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password, email, displayName })
                });

                const text = await response.text();

                if (response.ok) {
                    successDiv.textContent = '注册成功！即将跳转到登录页...';
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    // 尝试解析为 JSON，如果失败则直接显示原文
                    let msg = text;
                    try {
                        const data = JSON.parse(text);
                        msg = (typeof data === 'object' && data !== null && data.message) ? data.message : text;
                    } catch (_) { /* 已是纯文本 */ }
                    errorDiv.textContent = msg;
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请重试';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
