<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{surname}家谱 - 公开宣传页</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        .banner {
            background: linear-gradient(135deg, #8a4b24 0%, #b96d3b 100%);
            color: white;
            padding: 50px 20px;
            text-align: center;
        }
        .banner h1 {
            font-size: clamp(28px, 5vw, 42px);
            margin-bottom: 10px;
        }
        #genealogySurname {
            font-size: 18px;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        .card h2 {
            color: #8a4b24;
            margin-bottom: 20px;
            font-size: 22px;
        }
        #description {
            color: #554433;
            line-height: 1.8;
            font-size: 16px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #fdf8f3;
            text-align: center;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(138, 75, 36, 0.08);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #8a4b24;
        }
        .stat-label {
            color: #7a6752;
            margin-top: 6px;
        }
        #info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }
        .info-item {
            padding: 12px;
            background: #fdf8f3;
            border-radius: 8px;
        }
        .info-item label {
            display: block;
            color: #7a6752;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .info-item value {
            font-size: 16px;
            color: #2f2419;
            font-weight: 500;
        }
        .activity-list {
            display: grid;
            gap: 12px;
        }
        .activity-item {
            border: 1px solid #e8d9c8;
            border-radius: 12px;
            padding: 16px;
            background: #fdf8f3;
        }
        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .activity-header h3 {
            font-size: 18px;
            color: #2f2419;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-planned {
            background: #e6f2ff;
            color: #409eff;
        }
        .badge-ongoing {
            background: #f0f9eb;
            color: #67c23a;
        }
        .badge-finished {
            background: #f4f4f5;
            color: #909399;
        }
        .activity-date {
            color: #7a6752;
            font-size: 14px;
        }
        .activity-desc {
            color: #554433;
            line-height: 1.7;
            margin-top: 10px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #7a6752;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        .page-btn {
            padding: 6px 12px;
            border: 1px solid #dfd1bc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .page-btn.active {
            background: #8a4b24;
            color: white;
            border-color: #8a4b24;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .photo-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #fdf8f3;
            cursor: pointer;
        }
        .photo-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }
        .photo-title {
            padding: 8px 12px;
            font-size: 14px;
            color: #2f2419;
        }
        .celebrity-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .celebrity-card {
            background: #fdf8f3;
            border: 1px solid #e8d9c8;
            border-radius: 12px;
            overflow: hidden;
        }
        .celebrity-photo {
            height: 200px;
            overflow: hidden;
        }
        .celebrity-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .celebrity-photo-empty {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7a6752;
            background: #f5f0ea;
        }
        .celebrity-info {
            padding: 16px;
        }
        .celebrity-name {
            font-size: 20px;
            font-weight: bold;
            color: #8a4b24;
            margin-bottom: 4px;
        }
        .celebrity-title {
            color: #554433;
            margin-bottom: 4px;
        }
        .celebrity-years {
            color: #7a6752;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .celebrity-bio {
            color: #554433;
            line-height: 1.6;
            font-size: 14px;
        }
        .migration-list {
            display: grid;
            gap: 12px;
            margin-top: 15px;
        }
        .migration-item {
            background: #fdf8f3;
            border: 1px solid #e8d9c8;
            border-radius: 8px;
            padding: 12px 16px;
        }
        .migration-path {
            font-size: 16px;
            color: #8a4b24;
            margin-bottom: 4px;
        }
        .migration-info {
            color: #7a6752;
            font-size: 14px;
        }
        .back-link {
            text-align: center;
            margin: 20px 0;
        }
        .back-link a {
            color: #8a4b24;
            text-decoration: none;
        }
        .footer {
            text-align: center;
            padding: 40px 0;
            color: #7a6752;
            font-size: 14px;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .container {
                margin: 15px auto;
                padding: 0 10px;
            }
            .card {
                padding: 18px;
            }
            .celebrity-list {
                grid-template-columns: 1fr;
            }
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <h1 id="genealogyName">家谱加载中...</h1>
        <p id="genealogySurname"></p>
    </div>

    <div class="container">
        <div class="card">
            <h2>📝 简介</h2>
            <p id="description"></p>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="stat-people">0</div>
                    <div class="stat-label">家族人数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-generations">0</div>
                    <div class="stat-label">世代数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-activities">0</div>
                    <div class="stat-label">宗亲活动</div>
                </div>
            </div>
            <div id="info-grid">
            </div>
        </div>

        <div class="card">
            <h2>👔 家族名人</h2>
            <div class="celebrity-list" id="celebrity-list">
                <div class="empty">加载中...</div>
            </div>
        </div>

        <div class="card">
            <h2>🗺️ 家族迁徙路线</h2>
            <div id="migration-map" style="width: 100%; height: 500px; border-radius: 12px; border: 1px solid #e8d9c8;"></div>
            <div class="migration-list" id="migration-list" style="margin-top: 20px;">
                <div class="empty">加载中...</div>
            </div>
        </div>

        <div class="card">
            <h2>📷 家族相册</h2>
            <div class="photo-grid" id="photo-grid">
                <div class="empty">加载中...</div>
            </div>
        </div>

        <div class="card">
            <h2>💬 宗亲留言板</h2>
            <div class="message-form" id="message-form">
                <input type="text" id="messageAuthor" placeholder="你的姓名" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
                <input type="text" id="messageContact" placeholder="联系方式（可选）" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
                <textarea id="messageContent" placeholder="写下你的留言..." rows="4" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;"></textarea>
                <button class="btn-submit" onclick="submitMessage()">发布留言</button>
            </div>
            <div class="message-list" id="message-list" style="margin-top: 20px;">
                <div class="empty">加载中...</div>
            </div>
            <div class="pagination" id="message-pagination"></div>
        </div>

        <div class="back-link">
            <a href="/root-search.html">🔍 寻根请到这里</a>
        </div>

        <div class="footer">
            © <span id="year"></span> 家谱管理系统 • 由技术驱动家族文化传承
        </div>
    </div>

<script>
    const genealogyId = new URLSearchParams(window.location.search).get('id');
    document.getElementById('year').textContent = new Date().getFullYear();

    if (!genealogyId) {
        document.getElementById('genealogyName').textContent = '缺少家谱ID';
    } else {
        loadGenealogy();
        loadActivities(1);
        loadCelebrities();
        loadMigrations();
        loadPhotos();
        loadMessages(1);
    }

    function loadGenealogy() {
        fetch(`/api/genealogy/${genealogyId}`)
        .then(res => res.json())
        .then(data => {
            if (data.code === 0 && data.data) {
                const g = data.data;
                document.getElementById('genealogyName').textContent = g.name;
                document.getElementById('genealogySurname').textContent = g.originPlace ? `祖籍：${g.originPlace}` : '';
                document.getElementById('description').textContent = g.description || '暂无简介';
                document.getElementById('stat-people').textContent = g.totalPeople || 0;
                document.getElementById('stat-generations').textContent = g.maxGeneration || 0;

                const grid = document.getElementById('info-grid');
                let html = '';
                html += `<div class="info-item"><label>姓氏</label><value>${g.surname || '-'}</value></div>`;
                html += `<div class="info-item"><label>起源地</label><value>${g.originPlace || '-'}</value></div>`;
                grid.innerHTML = html;
            }
        });
    }

    function loadActivities(page) {
        fetch(`/api/activity/public/${genealogyId}?page=${page}&size=10`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                renderActivityList(data.data);
                renderPagination(data.currentPage, data.totalPages);
                document.getElementById('stat-activities').textContent = data.total;
            }
        });
    }

    function renderActivityList(list) {
        const container = document.getElementById('activity-list');
        if (list.length === 0) {
            container.innerHTML = '<div class="empty">暂无公开活动</div>';
            return;
        }
        let html = '';
        list.forEach(a => {
            const badgeClass = {
                'planned': 'badge-planned',
                'ongoing': 'badge-ongoing',
                'finished': 'badge-finished'
            }[a.status] || 'badge-planned';

            const typeNames = {
                'meeting': '宗亲联谊会',
                'ancestor-worship': '祭祖活动',
                'construction': '祠堂修建',
                'other': '其他活动'
            };
            const typeName = typeNames[a.type] || a.type;

            html += `
                <div class="activity-item">
                    <div class="activity-header">
                        <h3>${a.title}</h3>
                        <span class="badge ${badgeClass}">${typeName}</span>
                    </div>
                    <div class="activity-date">📍 ${a.location || '未设置'} • 📅 ${a.activityDate || '未确定'}</div>
                    ${a.description ? `<div class="activity-desc">${a.description}</div>` : ''}
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderPagination(current, total) {
        const container = document.getElementById('pagination');
        if (total <= 1) {
            container.innerHTML = '';
            return;
        }
        let html = '';
        for (let i = 1; i <= total; i++) {
            html += `<span class="page-btn ${i === current ? 'active' : ''}" onclick="loadActivities(${i})">${i}</span>`;
        }
        container.innerHTML = html;
    }

    // ========== 家族名人 ==========
    function loadCelebrities() {
        fetch(`/api/family-celebrity/public/${genealogyId}`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                renderCelebrities(data.data);
            }
        });
    }

    function renderCelebrities(list) {
        const container = document.getElementById('celebrity-list');
        if (list.length === 0) {
            container.innerHTML = '<div class="empty">暂无家族名人介绍</div>';
            return;
        }
        let html = '';
        list.forEach(c => {
            const years = [c.birthYear, c.deathYear].filter(Boolean).join(' - ');
            html += `
                <div class="celebrity-card">
                    <div class="celebrity-photo">
                        ${c.photoUrl ? `<img src="${c.photoUrl}" alt="${c.name}">` : `<div class="celebrity-photo-empty">暂无照片</div>`}
                    </div>
                    <div class="celebrity-info">
                        <div class="celebrity-name">${c.name} ${c.styleName ? `字${c.styleName}` : ''} ${c.hao ? `号${c.hao}` : ''}</div>
                        ${c.title ? `<div class="celebrity-title">${c.title}</div>` : ''}
                        ${years ? `<div class="celebrity-years">${years}</div>` : ''}
                        ${c.biography ? `<div class="celebrity-bio">${c.biography}</div>` : ''}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ========== 家族迁徙 ==========
    function loadMigrations() {
        fetch(`/api/family-migration/public/${genealogyId}`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                renderMigrations(data.data);
                renderMigrationMap(data.data);
            }
        });
    }

    function renderMigrations(list) {
        const container = document.getElementById('migration-list');
        if (list.length === 0) {
            container.innerHTML = '<div class="empty">暂无迁徙记录</div>';
            return;
        }
        let html = '';
        list.forEach(m => {
            html += `
                <div class="migration-item">
                    <div class="migration-path">${m.name} ${m.year ? `(${m.year})` : ''}</div>
                    <div class="migration-info">${m.fromPlace || ''} → ${m.toPlace || ''}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderMigrationMap(list) {
        // 需要高德地图API
        if (!window.AMap) {
            // 动态加载高德SDK
            const script = document.createElement('script');
            script.src = 'https://webapi.amap.com/maps?v=1.4.15&key=YOUR_AMAP_KEY';
            script.onload = () => {
                initMigrationMap(list);
            };
            document.head.appendChild(script);
        } else {
            initMigrationMap(list);
        }
    }

    function initMigrationMap(list) {
        const map = new AMap.Map('migration-map', {
            zoom: 5,
            center: [104, 30]
        });
        window.migrationMap = map;

        // 画出所有迁徙路线
        list.forEach(m => {
            if (m.fromLat && m.fromLng && m.toLat && m.toLng) {
                // 添加起点终点标记
                const fromMarker = new AMap.Marker({
                    position: new AMap.LngLat(m.fromLng, m.fromLat),
                    title: m.fromPlace,
                    map: map
                });
                const toMarker = new AMap.Marker({
                    position: new AMap.LngLat(m.toLng, m.toLat),
                    title: m.toPlace,
                    map: map
                });
                // 画线
                const path = [
                    new AMap.LngLat(m.fromLng, m.fromLat),
                    new AMap.LngLat(m.toLng, m.toLat)
                ];
                const polyline = new AMap.Polyline({
                    path: path,
                    strokeColor: '#8a4b24',
                    strokeWeight: 4,
                    strokeOpacity: 0.8
                });
                map.add(polyline);
                // 自适应视野
                const bounds = new AMap.Bounds(path[0], path[1]);
                map.setBounds(bounds, true);
            }
        });
    }

    // ========== 家族相册 ==========
    function loadPhotos() {
        fetch(`/api/family-photo/public/${genealogyId}`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                renderPhotos(data.data);
            }
        });
    }

    function renderPhotos(list) {
        const container = document.getElementById('photo-grid');
        if (list.length === 0) {
            container.innerHTML = '<div class="empty">暂无照片</div>';
            return;
        }
        let html = '';
        list.forEach(photo => {
            html += `
                <div class="photo-item" onclick="openPhoto('${photo.url}')">
                    <img src="${photo.url}" alt="${photo.title}">
                    <div class="photo-title">${photo.title}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function openPhoto(url) {
        window.open(url, '_blank');
    }

    // ========== 留言板 ==========
    function loadMessages(page) {
        fetch(`/api/family-message/list/${genealogyId}?page=${page}&size=20`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                renderMessages(data.data);
                renderMessagePagination(data.currentPage, data.totalPages);
            }
        });
    }

    function renderMessages(list) {
        const container = document.getElementById('message-list');
        if (list.length === 0) {
            container.innerHTML = '<div class="empty">暂无留言，快来抢沙发吧</div>';
            return;
        }
        let html = '';
        list.forEach(msg => {
            html += `
                <div class="message-item">
                    <div class="message-header">
                        <span class="message-author">${msg.authorName}</span>
                        <span class="message-date">${msg.createdAt}</span>
                    </div>
                    <div class="message-content">${msg.content}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderMessagePagination(current, total) {
        const container = document.getElementById('message-pagination');
        if (total <= 1) {
            container.innerHTML = '';
            return;
        }
        let html = '';
        for (let i = 1; i <= total; i++) {
            html += `<span class="page-btn ${i === current ? 'active' : ''}" onclick="loadMessages(${i})">${i}</span>`;
        }
        container.innerHTML = html;
    }

    function submitMessage() {
        const author = document.getElementById('messageAuthor').value.trim();
        const contact = document.getElementById('messageContact').value.trim();
        const content = document.getElementById('messageContent').value.trim();
        if (!author) {
            alert('请填写姓名');
            return;
        }
        if (!content) {
            alert('请填写留言内容');
            return;
        }
        const data = {
            genealogyId: parseInt(genealogyId),
            authorName: author,
            contact: contact,
            content: content,
            parentId: 0
        };
        fetch('/api/family-message/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(result => {
            if (result.success) {
                alert('留言发布成功，等待管理员审核后显示');
                document.getElementById('messageAuthor').value = '';
                document.getElementById('messageContact').value = '';
                document.getElementById('messageContent').value = '';
                loadMessages(1);
            } else {
                alert(result.message || '发布失败');
            }
        });
    }
</script>
</body>
</html>
