<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物列表后台</title>
    <style>
        :root{
            --bg:#f4efe6;
            --panel:#fffdfa;
            --panel-2:#f7f1e7;
            --text:#2f2419;
            --muted:#7a6752;
            --line:#dfd1bc;
            --primary:#8a4b24;
            --primary-2:#b96d3b;
            --danger:#b53d2e;
            --shadow:0 18px 40px rgba(73,48,24,.12);
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
            color:var(--text);
            background:
                radial-gradient(circle at top left, rgba(185,109,59,.16), transparent 28%),
                linear-gradient(180deg, #fbf7f1 0%, var(--bg) 100%);
            min-height:100vh;
        }
        a{color:inherit;text-decoration:none}
        .topbar{
            position:sticky;top:0;z-index:10;
            display:flex;justify-content:space-between;align-items:center;
            padding:16px 24px;
            background:rgba(255,253,250,.92);
            backdrop-filter:blur(10px);
            border-bottom:1px solid rgba(138,75,36,.14);
        }
        .brand{display:flex;flex-direction:column;gap:4px}
        .brand strong{font-size:18px}
        .muted{color:var(--muted)}
        .lang-switch,.actions,.filters,.summary,.list-head,.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        .btn,.chip,select,input{
            border-radius:999px;
            border:1px solid var(--line);
            background:#fff;
            color:var(--text);
            font:inherit;
        }
        .btn{
            cursor:pointer;
            padding:10px 16px;
            transition:.2s ease;
        }
        .btn:hover{transform:translateY(-1px);box-shadow:0 10px 20px rgba(73,48,24,.08)}
        .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent}
        .btn-danger{background:#fff7f5;color:var(--danger);border-color:#efc8c1}
        .btn.active,.chip.active{background:var(--panel-2);border-color:#c89d72;color:var(--primary)}
        .chip{padding:8px 12px;display:inline-flex;align-items:center;gap:6px}
        select,input{padding:10px 14px;min-height:44px}
        main{padding:28px 24px 40px}
        .hero{
            background:linear-gradient(135deg, rgba(138,75,36,.96), rgba(70,48,30,.96));
            color:#fff;
            border-radius:28px;
            padding:28px;
            box-shadow:var(--shadow);
            margin-bottom:22px;
        }
        .hero h1{margin:0 0 10px;font-size:34px}
        .hero p{margin:0;max-width:780px;color:rgba(255,245,235,.88);line-height:1.6}
        .layout{
            display:grid;
            grid-template-columns:320px minmax(0,1fr);
            gap:20px;
        }
        .panel{
            background:var(--panel);
            border:1px solid rgba(138,75,36,.12);
            border-radius:24px;
            box-shadow:var(--shadow);
        }
        .panel-body{padding:22px}
        .panel h2{margin:0 0 8px;font-size:22px}
        .intro{margin:0 0 16px;color:var(--muted);line-height:1.6}
        .metrics{
            display:grid;
            grid-template-columns:repeat(2,minmax(0,1fr));
            gap:12px;
            margin-bottom:16px;
        }
        .metric{
            background:var(--panel-2);
            border:1px solid rgba(138,75,36,.08);
            border-radius:18px;
            padding:14px;
        }
        .metric strong{display:block;font-size:24px;margin-top:4px}
        .filters{margin-bottom:16px}
        .filters > *{flex:1 1 180px}
        .list{display:grid;gap:14px}
        .card{
            border:1px solid rgba(138,75,36,.12);
            border-radius:20px;
            background:#fff;
            padding:16px;
            transition:.2s ease;
        }
        .card:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(73,48,24,.08)}
        .card strong{font-size:18px}
        .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;color:var(--muted)}
        .empty,.tip,.status{
            border-radius:16px;
            padding:12px 14px;
            background:var(--panel-2);
            color:var(--muted);
            border:1px dashed rgba(138,75,36,.14);
        }
        .status.error{background:#fff4f2;border-color:#efc8c1;color:#9c3327}
        .status.success{background:#f4fbf4;border-color:#cce6cc;color:#2c6a3a}
        .hidden{display:none!important}
        @media (max-width:960px){
            .layout{grid-template-columns:1fr}
            .hero h1{font-size:28px}
        }
        @media (max-width:600px){
            main{padding:15px 12px 30px}
            .hero{padding:20px;border-radius:20px}
            .hero h1{font-size:24px}
            .topbar{padding:12px 12px}
            .topbar .actions{gap:6px}
            .topbar .btn{padding:8px 12px}
            .brand strong{font-size:16px}
            .brand .muted{display:none}
            .filters > *{flex:1 1 140px}
            .panel-body{padding:16px}
            .metrics{grid-template-columns:repeat(2,1fr)}
        }
    </style>
    <link rel="stylesheet" href="/task-module-pattern.css">
</head>
<body>
<header class="topbar">
    <div class="brand">
        <strong id="brand-title">人物列表后台</strong>
        <span class="muted" id="brand-subtitle">从这里进入正式的人物管理与详情编辑流程</span>
    </div>
    <div class="actions">
        <a class="btn" href="/" id="home-link">返回首页</a>
        <a class="btn" href="/person-entry.html" id="entry-link">打开录入台</a>
        <a class="btn" href="/branch-admin.html" id="branch-admin-link">打开支系后台</a>
        <button class="btn btn-primary" type="button" id="create-btn">新建人物</button>
        <div class="lang-switch">
            <button class="btn" type="button" id="lang-zh">中文</button>
            <button class="btn" type="button" id="lang-en">English</button>
        </div>
    </div>
</header>

<main>
    <section class="hero">
        <h1 id="hero-title">人物列表后台</h1>
        <p id="hero-desc">这里是正式后台的第一步：集中查看人物、筛选支系、搜索目标成员，并直接进入人物详情与关系维护。</p>
    </section>

    <div class="layout">
        <section class="panel">
            <div class="panel-body">
                <h2 id="sidebar-title">筛选与概览</h2>
                <p class="intro" id="sidebar-intro">先选家谱，再按支系和关键字筛选目标人物。</p>

                <div class="metrics">
                    <div class="metric">
                        <span class="muted" id="metric-genealogy-label">当前家谱</span>
                        <strong id="metric-genealogy">-</strong>
                    </div>
                    <div class="metric">
                        <span class="muted" id="metric-people-label">人物数量</span>
                        <strong id="metric-people">0</strong>
                    </div>
                    <div class="metric">
                        <span class="muted" id="metric-branch-label">支系数量</span>
                        <strong id="metric-branch">0</strong>
                    </div>
                    <div class="metric">
                        <span class="muted" id="metric-rel-label">关系数量</span>
                        <strong id="metric-rel">0</strong>
                    </div>
                </div>

                <div class="filters">
                    <select id="genealogyId"></select>
                    <select id="branchId"></select>
                    <input id="keyword" type="text" placeholder="按姓名、字、号、职业搜索">
                </div>

                <div class="tip" id="filter-tip">当前优先展示符合筛选条件的人物，点击人物卡片可直达详情页。</div>
                <div class="status hidden" id="status-box"></div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-body">
                <div class="list-head">
                    <div>
                        <h2 id="list-title">人物列表</h2>
                        <p class="intro" id="list-intro">优先用这里查看人物全貌，再进入详情页做深度编辑与关系维护。</p>
                    </div>
                    <span class="chip"><span id="count-label">人物</span>: <strong id="count-value">0</strong></span>
                </div>
                <div class="list" id="people-list"></div>
            </div>
        </section>
    </div>
</main>

<script>
const byId=id=>document.getElementById(id);
const state={lang:localStorage.getItem("gm-lang")||"zh",genealogies:[],branches:[],people:[],relations:[]};
const I18N={
zh:{
title:"人物列表后台",
subtitle:"从这里进入正式的人物管理与详情编辑流程",
home:"返回首页",
entry:"打开录入台",
branchAdmin:"打开支系后台",
create:"新建人物",
heroTitle:"人物列表后台",
heroDesc:"这里是正式后台的第一步：集中查看人物、筛选支系、搜索目标成员，并直接进入人物详情与关系维护。",
sidebarTitle:"筛选与概览",
sidebarIntro:"先选家谱，再按支系和关键字筛选目标人物。",
metricGenealogy:"当前家谱",
metricPeople:"人物数量",
metricBranch:"支系数量",
metricRel:"关系数量",
listTitle:"人物列表",
listIntro:"优先用这里查看人物全貌，再进入详情页做深度编辑与关系维护。",
countLabel:"人物",
filterTip:"当前优先展示符合筛选条件的人物，点击人物卡片可直达详情页。",
allGenealogies:"请选择家谱",
allBranches:"全部支系",
empty:"当前筛选条件下还没有人物。",
openDetail:"打开详情",
openEntry:"在录入台编辑",
newPerson:"新建人物",
years:"生卒",
branch:"支系",
generation:"世代",
loadFailed:"加载失败",
unknown:"未设置"
},
en:{
title:"People Admin",
subtitle:"Use this page as the formal starting point for person management and detail editing.",
home:"Home",
entry:"Open Entry Console",
branchAdmin:"Open Branch Admin",
create:"New Person",
heroTitle:"People Admin",
heroDesc:"This is the first formal admin page: browse people centrally, filter by branch, search targets, and jump into person detail with relationship maintenance.",
sidebarTitle:"Filters and Overview",
sidebarIntro:"Select a genealogy first, then narrow the list by branch and keyword.",
metricGenealogy:"Active Genealogy",
metricPeople:"People Count",
metricBranch:"Branch Count",
metricRel:"Relation Count",
listTitle:"People List",
listIntro:"Use this page to understand the people set first, then enter detail pages for deeper edits and relationship work.",
countLabel:"People",
filterTip:"The list below prioritizes the current filter result. Open a card to jump straight into detail editing.",
allGenealogies:"Select genealogy",
allBranches:"All branches",
empty:"No people match the current filters.",
openDetail:"Open Detail",
openEntry:"Edit in Entry Console",
newPerson:"Create Person",
years:"Years",
branch:"Branch",
generation:"Generation",
loadFailed:"Load failed",
unknown:"Not set"
}
};
const t=key=>I18N[state.lang==="en"?"en":"zh"][key]||key;
const setStatus=(message,type="")=>{const el=byId("status-box");el.textContent=message||"";el.className=`status${message?"":" hidden"}${type?` ${type}`:""}`;};
async function apiGet(url){const res=await fetch(url);if(!res.ok)throw new Error(res.statusText||"Request failed");return res.json();}
function branchName(id){return state.branches.find(item=>String(item.id)===String(id))?.name||t("unknown");}
function genealogyName(id){return state.genealogies.find(item=>String(item.id)===String(id))?.name||t("unknown");}
function filteredPeople(){
    const gid=byId("genealogyId").value;
    const bid=byId("branchId").value;
    const keyword=byId("keyword").value.trim().toLowerCase();
    return state.people.filter(item=>{
        if(gid&&String(item.genealogyId)!==gid)return false;
        if(bid&&String(item.branchId||"")!==bid)return false;
        if(!keyword)return true;
        return [item.name,item.courtesyName,item.artName,item.occupation].filter(Boolean).some(text=>String(text).toLowerCase().includes(keyword));
    });
}
function renderFilters(){
    const gidOptions=[`<option value="">${t("allGenealogies")}</option>`].concat(state.genealogies.map(item=>`<option value="${item.id}">${item.name}</option>`));
    byId("genealogyId").innerHTML=gidOptions.join("");
    const activeGid=state.genealogies[0]?.id?String(state.genealogies[0].id):"";
    if(!byId("genealogyId").value&&activeGid)byId("genealogyId").value=activeGid;
    const gid=byId("genealogyId").value;
    const branchOptions=[`<option value="">${t("allBranches")}</option>`].concat(state.branches.filter(item=>!gid||String(item.genealogyId)===gid).map(item=>`<option value="${item.id}">${item.name}</option>`));
    const prev=byId("branchId").value;
    byId("branchId").innerHTML=branchOptions.join("");
    if(branchOptions.some(opt=>opt.includes(`value="${prev}"`)))byId("branchId").value=prev;
}
function renderMetrics(){
    const gid=byId("genealogyId").value;
    const people=filteredPeople();
    byId("metric-genealogy").textContent=gid?genealogyName(gid):t("unknown");
    byId("metric-people").textContent=String(people.length);
    byId("metric-branch").textContent=String(state.branches.filter(item=>!gid||String(item.genealogyId)===gid).length);
    byId("metric-rel").textContent=String(state.relations.filter(item=>!gid||String(item.genealogyId)===gid).length);
    byId("count-value").textContent=String(people.length);
}
function renderList(){
    const list=byId("people-list");
    const people=filteredPeople().sort((a,b)=>String(a.name||"").localeCompare(String(b.name||""),"zh-Hans-CN"));
    if(!people.length){list.innerHTML=`<div class="empty">${t("empty")}</div>`;return;}
    list.innerHTML=people.map(person=>`
        <div class="card">
            <div class="list-head">
                <div>
                    <strong>${person.name||t("unknown")}</strong>
                    <div class="meta">
                        <span class="chip">#${person.id}</span>
                        <span class="chip">${t("branch")}: ${branchName(person.branchId)}</span>
                        <span class="chip">${t("generation")}: ${person.generationNo??person.generation??"-"}</span>
                    </div>
                </div>
                <div class="actions">
                    <a class="btn btn-primary" href="/person-entry.html?personId=${person.id}">${t("openDetail")}</a>
                    <a class="btn" href="/person-entry.html?personId=${person.id}">${t("openEntry")}</a>
                </div>
            </div>
            <div class="meta">
                <span>${t("years")}: ${person.birthYear||"-"} - ${person.deathYear||"-"}</span>
                ${person.title?`<span>${person.title}</span>`:""}
                ${person.occupation?`<span>${person.occupation}</span>`:""}
            </div>
            ${person.biographySummary?`<div class="tip">${person.biographySummary}</div>`:""}
        </div>
    `).join("");
}
function updateText(){
    document.title=t("title");
    byId("brand-title").textContent=t("title");
    byId("brand-subtitle").textContent=t("subtitle");
    byId("home-link").textContent=t("home");
    byId("entry-link").textContent=t("entry");
    byId("branch-admin-link").textContent=t("branchAdmin");
    byId("create-btn").textContent=t("create");
    byId("hero-title").textContent=t("heroTitle");
    byId("hero-desc").textContent=t("heroDesc");
    byId("sidebar-title").textContent=t("sidebarTitle");
    byId("sidebar-intro").textContent=t("sidebarIntro");
    byId("metric-genealogy-label").textContent=t("metricGenealogy");
    byId("metric-people-label").textContent=t("metricPeople");
    byId("metric-branch-label").textContent=t("metricBranch");
    byId("metric-rel-label").textContent=t("metricRel");
    byId("list-title").textContent=t("listTitle");
    byId("list-intro").textContent=t("listIntro");
    byId("count-label").textContent=t("countLabel");
    byId("filter-tip").textContent=t("filterTip");
    byId("keyword").placeholder=state.lang==="en"?"Search by name, courtesy name, art name, or occupation":"按姓名、字、号、职业搜索";
    byId("lang-zh").classList.toggle("active",state.lang==="zh");
    byId("lang-en").classList.toggle("active",state.lang==="en");
}
async function refresh(){
    const [genealogies,branches,people,relations]=await Promise.all([
        apiGet("/api/genealogy/all"),
        apiGet("/api/branch/all"),
        apiGet("/api/person/all"),
        apiGet("/api/person-relation/all")
    ]);
    state.genealogies=genealogies.data||[];
    state.branches=branches.data||[];
    state.people=people.data||[];
    state.relations=relations.data||[];
    renderFilters();
    renderMetrics();
    renderList();
}
function rerender(){updateText();renderFilters();renderMetrics();renderList();}
byId("lang-zh").onclick=()=>{state.lang="zh";localStorage.setItem("gm-lang","zh");rerender();};
byId("lang-en").onclick=()=>{state.lang="en";localStorage.setItem("gm-lang","en");rerender();};
byId("genealogyId").onchange=()=>{renderFilters();renderMetrics();renderList();};
byId("branchId").onchange=()=>{renderMetrics();renderList();};
byId("keyword").oninput=()=>{renderMetrics();renderList();};
byId("create-btn").onclick=()=>{window.location.href="/person-entry.html";};
updateText();
refresh().catch(error=>setStatus(`${t("loadFailed")}: ${error.message}`,"error"));
function peopleAdminExtraText(key){
    const messages={
        zh:{
            resultsTitle:"当前筛选概览",
            resultsIntro:"这一区会告诉你当前筛选正在聚焦哪一组人物，并给出最直接的下一步入口。",
            activeGenealogy:"家谱",
            activeBranch:"支系",
            activeKeyword:"关键词",
            all:"全部",
            none:"未设置",
            matched:"匹配人物",
            featuredTitle:"优先查看",
            featuredIntro:"优先打开这些人物，可以更快进入真实录入和关系维护。",
            openDetail:"进入详情页",
            openEntry:"在录入台编辑",
            createHere:"从这里新建人物"
        },
        en:{
            resultsTitle:"Current Filter Summary",
            resultsIntro:"This block explains what the current filters focus on and gives the quickest next actions.",
            activeGenealogy:"Genealogy",
            activeBranch:"Branch",
            activeKeyword:"Keyword",
            all:"All",
            none:"Not set",
            matched:"Matched People",
            featuredTitle:"Prioritized Profiles",
            featuredIntro:"Open these people first to move faster into real editing and relationship work.",
            openDetail:"Open Detail",
            openEntry:"Edit in Entry Console",
            createHere:"Create from Here"
        }
    };
    return messages[state.lang==="en"?"en":"zh"][key]||key;
}
function ensurePeopleAdminExtras(){
    let summary=byId("people-admin-summary");
    const sidebar=byId("filter-tip")?.parentNode;
    if(sidebar&&!summary){
        summary=document.createElement("div");
        summary.id="people-admin-summary";
        summary.className="person-summary";
        summary.style.marginTop="14px";
        sidebar.appendChild(summary);
    }
    let featured=byId("people-admin-featured");
    const listPanel=byId("people-list")?.parentNode;
    if(listPanel&&!featured){
        featured=document.createElement("div");
        featured.id="people-admin-featured";
        featured.className="person-summary";
        featured.style.marginBottom="16px";
        listPanel.insertBefore(featured,byId("people-list"));
    }
    return{summary,featured};
}
function currentFilterParams(){
    const params=new URLSearchParams();
    const gid=byId("genealogyId")?.value;
    const bid=byId("branchId")?.value;
    const keyword=byId("keyword")?.value?.trim();
    if(gid)params.set("genealogyId",gid);
    if(bid)params.set("branchId",bid);
    if(keyword)params.set("keyword",keyword);
    return params;
}
function personDetailHref(personId){
    const params=currentFilterParams();
    params.set("personId",personId);
    return `/person-entry.html?${params.toString()}`;
}
function renderPeopleAdminSummary(){
    const {summary}=ensurePeopleAdminExtras();
    if(!summary)return;
    const gid=byId("genealogyId")?.value;
    const bid=byId("branchId")?.value;
    const keyword=byId("keyword")?.value?.trim();
    const people=filteredPeople();
    summary.innerHTML=`
        <div class="list-head">
            <div>
                <h3>${peopleAdminExtraText("resultsTitle")}</h3>
                <p class="intro">${peopleAdminExtraText("resultsIntro")}</p>
            </div>
            <div class="actions">
                <a class="btn btn-primary" href="/person-entry.html">${peopleAdminExtraText("createHere")}</a>
            </div>
        </div>
        <div class="row" style="margin-top:10px;">
            <span class="chip">${peopleAdminExtraText("activeGenealogy")}: <strong>${gid?genealogyName(gid):peopleAdminExtraText("all")}</strong></span>
            <span class="chip">${peopleAdminExtraText("activeBranch")}: <strong>${bid?branchName(bid):peopleAdminExtraText("all")}</strong></span>
            <span class="chip">${peopleAdminExtraText("activeKeyword")}: <strong>${keyword||peopleAdminExtraText("none")}</strong></span>
            <span class="chip">${peopleAdminExtraText("matched")}: <strong>${people.length}</strong></span>
        </div>
    `;
}
function renderPeopleAdminFeatured(){
    const {featured}=ensurePeopleAdminExtras();
    if(!featured)return;
    const people=filteredPeople().slice().sort((a,b)=>{
        const genA=Number(a.generationNo??a.generation??999);
        const genB=Number(b.generationNo??b.generation??999);
        if(genA!==genB)return genA-genB;
        return String(a.name||"").localeCompare(String(b.name||""),"zh-Hans-CN");
    }).slice(0,3);
    if(!people.length){
        featured.innerHTML="";
        return;
    }
    featured.innerHTML=`
        <div class="list-head">
            <div>
                <h3>${peopleAdminExtraText("featuredTitle")}</h3>
                <p class="intro">${peopleAdminExtraText("featuredIntro")}</p>
            </div>
        </div>
        ${people.map(person=>`
            <div class="card" style="margin-top:10px;">
                <div class="list-head">
                    <div>
                        <strong>${person.name||t("unknown")}</strong>
                        <div class="meta">
                            <span class="chip">#${person.id}</span>
                            <span class="chip">${t("branch")}: ${branchName(person.branchId)}</span>
                            <span class="chip">${t("generation")}: ${person.generationNo??person.generation??"-"}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <a class="btn btn-primary" href="${personDetailHref(person.id)}">${peopleAdminExtraText("openDetail")}</a>
                        <a class="btn" href="${personDetailHref(person.id)}">${peopleAdminExtraText("openEntry")}</a>
                    </div>
                </div>
            </div>
        `).join("")}
    `;
}
const __peopleAdminOriginalRenderList=renderList;
renderList=function(){
    __peopleAdminOriginalRenderList();
    renderPeopleAdminFeatured();
};
const __peopleAdminOriginalRenderMetrics=renderMetrics;
renderMetrics=function(){
    __peopleAdminOriginalRenderMetrics();
    renderPeopleAdminSummary();
};
const __peopleAdminOriginalUpdateText=updateText;
updateText=function(){
    __peopleAdminOriginalUpdateText();
    renderPeopleAdminSummary();
    renderPeopleAdminFeatured();
};
const __peopleAdminOriginalRefresh=refresh;
refresh=async function(){
    await __peopleAdminOriginalRefresh();
    renderPeopleAdminSummary();
    renderPeopleAdminFeatured();
};
function peopleAdminContextParams(){
    const params=new URLSearchParams();
    const gid=byId("genealogyId")?.value;
    const bid=byId("branchId")?.value;

function peoplePrioritySnapshot(person){

    if(!snapshot.fatherName&&!snapshot.motherName){
        score+=4;
        reasons.push(peopleAdminPriorityText("missingParents"));
    }else{
        if(!snapshot.fatherName){
            score+=2;
            reasons.push(peopleAdminPriorityText("missingFather"));
        }
        if(!snapshot.motherName){
            score+=2;
            reasons.push(peopleAdminPriorityText("missingMother"));
        }
    }
    if(snapshot.spouseCount===0){
        score+=1;
        reasons.push(peopleAdminPriorityText("missingSpouse"));
    }
    if(!person.biographySummary){
        score+=1;
        reasons.push(peopleAdminPriorityText("missingSummary"));
    }
    if(!person.source){
        score+=1;
        reasons.push(peopleAdminPriorityText("missingSource"));
    }
    if(!person.branchId){
        score+=1;
        reasons.push(peopleAdminPriorityText("missingBranch"));

function priorityReasonDone(person,reason){
    const text=String(reason||"").toLowerCase();
    if(!text)return false;
    const outgoing=state.relations.filter(item=>String(item.personId)===String(person.id));
    if(text.includes("父亲")||text.includes("father"))return outgoing.some(item=>item.relationType==="FATHER");
    if(text.includes("母亲")||text.includes("mother"))return outgoing.some(item=>item.relationType==="MOTHER");
    if(text.includes("配偶")||text.includes("spouse"))return outgoing.some(item=>item.relationType==="SPOUSE");
    if(text.includes("简介")||text.includes("summary"))return Boolean(person.biographySummary);
    if(text.includes("来源")||text.includes("source"))return Boolean(person.source);
    if(text.includes("支系")||text.includes("branch"))return Boolean(person.branchId);
    if(text.includes("生卒")||text.includes("years"))return Boolean(person.birthYear||person.deathYear);
    if(text.includes("父母")||text.includes("parent")){
        return outgoing.some(item=>item.relationType==="FATHER")&&outgoing.some(item=>item.relationType==="MOTHER");
    }
    return false;
}

function inferPeopleAdminFeedbackMode(reason){
    const text=String(reason||"").toLowerCase();
    if(!text)return state.quickRelation||null;
    if(text.includes("父")||text.includes("father"))return "father";
    if(text.includes("母")||text.includes("mother"))return "mother";
    if(text.includes("配偶")||text.includes("spouse"))return "spouse";
    if(text.includes("简介")||text.includes("summary"))return "profile-summary";
    if(text.includes("来源")||text.includes("source"))return "profile-source";
    if(text.includes("支系")||text.includes("branch"))return "profile-branch";
    if(text.includes("生卒")||text.includes("年代")||text.includes("years"))return "profile-years";
    return state.quickRelation||null;
}

const __peopleAdminFeedbackTrailBase=renderPeopleAdminFeedbackTrail;

    if(hidden&&(state.completedTask||state.returnNextTask)){
        let restore=byId("people-admin-feedback-restore");
        const target=byId("people-admin-summary");
        if(!restore&&target){
            restore=document.createElement("div");
            restore.id="people-admin-feedback-restore";
            restore.className="task-ribbon";
            restore.style.marginBottom="12px";
            target.parentNode.insertBefore(restore,target);
        }
        if(restore){
            restore.innerHTML=`
                <span class="chip">${peopleAdminFeedbackText("title")}</span>
                <button class="btn btn-chip" type="button" onclick="restorePeopleAdminFeedbackTrail()">${peopleAdminFeedbackText("dismiss")}</button>
            `;
        }
        byId("people-admin-feedback-trail")?.remove();
        return;
    }
    byId("people-admin-feedback-restore")?.remove();
    __peopleAdminFeedbackTrailBase();
    const bar=byId("people-admin-feedback-trail");
    if(!bar||(!state.completedTask&&!state.returnNextTask))return;
    let actions=bar.querySelector('[data-feedback-actions="true"]');
    if(!actions){
        actions=document.createElement("div");
        actions.className="actions";
        actions.style.marginTop="12px";
        actions.setAttribute("data-feedback-actions","true");
        bar.appendChild(actions);
    }
    const activeReason=state.returnNextTask||state.completedTask||state.focusReason||"";
    const activeMode=inferPeopleAdminFeedbackMode(activeReason);
    const homeQuery=new URLSearchParams();
    if(state.lastFocusPersonId)homeQuery.set("personId",String(state.lastFocusPersonId));
    if(state.completedTask)homeQuery.set("completedTask",state.completedTask);
    if(state.returnNextTask)homeQuery.set("nextTask",state.returnNextTask);
    actions.innerHTML=`
        ${state.lastFocusPersonId&&activeReason?`<a class="btn btn-primary" href="${personRelationActionHrefWithReason(state.lastFocusPersonId,activeMode,activeReason,state.focusSource||"people-admin")}">${peopleAdminFeedbackActionText("continue")}</a>`:""}

        <a class="btn btn-chip" href="/${homeQuery.toString()?`?${homeQuery.toString()}`:""}">${peopleAdminFeedbackActionText("home")}</a>
    `;
};

        ["people-admin-task-batch",["task-module-shell","task-module-soft"]]

        const node=byId(id);
        if(!node)return;
        node.classList.add(...classes);

function applyPeopleAdminSecondaryTaskModules(){
    ["filter-tip","status-box","people-admin-focus-hint"].forEach(id=>{
        const node=byId(id);
        if(!node)return;
        node.classList.add("task-module-shell","task-module-soft","task-module-compact","task-module-inline");
    });
    document.querySelectorAll('[data-batch-return-hint="true"]').forEach(node=>{
        node.classList.add("task-module-shell","task-module-soft","task-module-compact","task-module-inline");
    });
    const peopleList=byId("people-list");
    if(peopleList){
        peopleList.classList.add("task-module-list");
        peopleList.querySelectorAll(".card").forEach(node=>{
            node.classList.add("task-module-item");
            node.classList.toggle("task-module-item-active",node.classList.contains("flash-focus"));
            node.dataset.taskModuleRole="people-card";
            node.querySelector(".entry-head,.list-head")?.classList.add("task-module-head");
        });
    }
    ["people-admin-featured","people-admin-priority","people-admin-branch-task","people-admin-task-batch"].forEach(id=>{
        const host=byId(id);
        if(!host)return;
        host.querySelectorAll(".card,.entry,.stat").forEach(node=>{
            node.classList.add("task-module-item");
            node.classList.toggle("task-module-item-active",node.classList.contains("flash-focus"));
            node.dataset.taskModuleRole=
                id==="people-admin-featured"?"featured-card":
                id==="people-admin-priority"?"priority-card":
                id==="people-admin-branch-task"?"branch-task-card":
                id==="people-admin-task-batch"?"batch-group-card":
                "secondary-card";
            node.querySelector(".entry-head,.list-head")?.classList.add("task-module-head");
        });
    });
}
