# 服务器端口
server.port=8080

# SQLite 数据库配置
spring.datasource.url=jdbc:sqlite:./genealogy.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.jdbc-url=jdbc:sqlite:./genealogy.db

# JPA/Hibernate 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=com.genealogy.config.SQLiteDialect
spring.jpa.properties.hibernate.format_sql=true

# 日志级别
logging.level.com.genealogy=info
